<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大狗桌宠</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <main class="settings-shell">
      <nav class="settings-tabs" aria-label="设置分类" role="tablist">
        <button class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="sound-panel" data-tab="sound">声音</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="pet-panel" data-tab="pet">桌宠</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="about-panel" data-tab="about">关于</button>
      </nav>

      <div class="settings-content">
        <section id="sound-panel" class="tab-panel is-active" role="tabpanel" data-panel="sound">
          <div class="section-block section-block-first">
            <label class="range-row" for="volume">
              <span>音量</span>
              <output id="volume-value" class="value" for="volume"></output>
              <input id="volume" type="range" min="0" max="100" step="1" />
            </label>
          </div>

          <div class="section-block">
            <label class="toggle-row" for="dog-melody">
              <span>狗叫旋律</span>
              <input id="dog-melody" type="checkbox" />
              <span class="toggle" aria-hidden="true"></span>
            </label>
            <label id="groove-tempo-row" class="range-row detail-row" for="groove-bpm">
              <span>速度</span>
              <output id="groove-bpm-value" class="value" for="groove-bpm"></output>
              <input id="groove-bpm" type="range" min="96" max="168" step="4" />
            </label>
          </div>

          <div class="section-block">
            <h2>声音模式</h2>
            <p class="field-label">大狗 按键</p>
            <div class="segmented" role="radiogroup" aria-label="大狗按键声音模式">
              <label>
                <input type="radio" name="sound-mode" value="alternate" />
                <span>大 / 狗</span>
              </label>
              <label>
                <input type="radio" name="sound-mode" value="da-gou" />
                <span>大狗</span>
              </label>
            </div>

            <div class="key-heading">
              <span class="field-label">叫 按键</span>
              <span id="key-count" class="key-count"></span>
            </div>
            <div id="jiao-keys" class="key-list"></div>
            <div class="key-actions">
              <button id="capture-key" class="primary-button" type="button">添加按键</button>
              <button id="restore-keys" class="secondary-button" type="button">恢复默认</button>
            </div>
            <p id="capture-state" class="capture-state" aria-live="polite"></p>
          </div>

        </section>

        <section id="pet-panel" class="tab-panel" role="tabpanel" data-panel="pet" hidden>
          <div class="section-block section-block-first">
            <label class="range-row" for="pet-scale">
              <span>大小</span>
              <output id="pet-scale-value" class="value" for="pet-scale"></output>
              <input id="pet-scale" type="range" min="65" max="500" step="1" />
            </label>
            <label class="range-row" for="reaction-intensity">
              <span>反应强度</span>
              <output id="reaction-intensity-value" class="value" for="reaction-intensity"></output>
              <input id="reaction-intensity" type="range" min="50" max="200" step="5" />
            </label>
          </div>

          <div class="section-block toggle-list">
            <label class="toggle-row" for="flip-horizontal">
              <span>左右镜像</span>
              <input id="flip-horizontal" type="checkbox" />
              <span class="toggle" aria-hidden="true"></span>
            </label>
            <label class="toggle-row" for="flip-vertical">
              <span>上下镜像</span>
              <input id="flip-vertical" type="checkbox" />
              <span class="toggle" aria-hidden="true"></span>
            </label>
            <label class="toggle-row" for="always-on-top">
              <span>强制置顶</span>
              <input id="always-on-top" type="checkbox" />
              <span class="toggle" aria-hidden="true"></span>
            </label>
            <label class="toggle-row" for="click-through">
              <span>鼠标穿透</span>
              <input id="click-through" type="checkbox" />
              <span class="toggle" aria-hidden="true"></span>
            </label>
          </div>
        </section>

        <section id="about-panel" class="tab-panel" role="tabpanel" data-panel="about" hidden>
          <div class="about-header">
            <img class="about-icon" src="../../assets/branding/tray-icon.png" alt="" />
            <div>
              <h2 class="product-name">大狗桌宠</h2>
              <p class="developer-line">开发者：Seb1900</p>
            </div>
          </div>

          <p class="license-line">未经许可禁止商业使用</p>

          <div class="update-block">
            <div>
              <strong>软件更新</strong>
              <p id="update-status" aria-live="polite">正在读取更新状态</p>
              <p id="update-detail" class="subtle"></p>
            </div>
            <button id="update-action" class="primary-button compact-button" type="button">检查更新</button>
          </div>

          <div class="reset-block">
            <div>
              <strong>恢复默认设置</strong>
              <p>保留桌宠当前所在位置</p>
            </div>
            <button id="reset-settings" class="danger-button compact-button" type="button">恢复默认</button>
          </div>

          <div class="link-grid">
            <button type="button" data-external="feedback">反馈问题</button>
            <button type="button" data-external="project">项目地址</button>
            <button type="button" data-document="privacy">隐私说明</button>
          </div>
        </section>
      </div>
    </main>

    <dialog id="document-dialog" class="document-dialog">
      <header>
        <h2 id="document-title">隐私说明</h2>
        <button id="close-document" class="icon-button" type="button" aria-label="关闭">×</button>
      </header>
      <pre id="document-body" class="document-body"></pre>
    </dialog>

    <dialog id="reset-dialog" class="confirm-dialog" aria-labelledby="reset-title">
      <form method="dialog">
        <h2 id="reset-title">恢复默认设置？</h2>
        <p>声音、外观和按键设置将恢复，桌宠位置会保留。</p>
        <p id="reset-error" class="confirm-error" aria-live="polite"></p>
        <div class="confirm-actions">
          <button id="cancel-reset" class="secondary-button" type="submit" value="cancel">取消</button>
          <button id="confirm-reset" class="danger-button" type="button">恢复默认</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./settings.ts"></script>
  </body>
</html>
