<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大狗叫桌宠</title>
  </head>
  <body>
    <main id="stage" class="stage" aria-label="大狗叫桌宠">
      <div id="dog" class="dog" aria-hidden="true">
        <div class="dog-mirror">
          <div id="dog-jelly" class="dog-jelly">
            <img id="dog-idle" class="dog-image" draggable="false" alt="" />
            <div id="dog-shy-group" class="dog-shy-group">
              <img id="dog-shy-tail" class="dog-image dog-shy-tail" draggable="false" alt="" />
              <img id="dog-shy" class="dog-image" draggable="false" alt="" />
            </div>
            <img id="dog-bark01" class="dog-image dog-image-state" draggable="false" alt="" />
            <img id="dog-bark02" class="dog-image dog-image-state" draggable="false" alt="" />
            <div id="dog-jiao-tint" class="dog-jiao-tint"></div>
            <img id="dog-idle-scale" class="dog-image dog-image-state" draggable="false" alt="" />
          </div>
          <div id="dog-hitbox" class="dog-hitbox"></div>
          <div id="scale-handle" class="scale-handle"></div>
        </div>
      </div>
      <div id="state-indicator" class="state-indicator" aria-hidden="true"></div>
    </main>
    <script type="module" src="./app.ts"></script>
  </body>
</html>
