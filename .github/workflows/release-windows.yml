name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust GNU
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          components: rustfmt, clippy

      - name: Install native build tools
        shell: pwsh
        run: choco install mingw nsis -y --no-progress

      - name: Validate version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $cargoToml = Get-Content Cargo.toml -Raw
          $version = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"').Groups[1].Value
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match Cargo version $version"
          }
          $escapedVersion = [regex]::Escape($version)
          if (-not (Select-String -Path CHANGELOG.md -Pattern "^## \[$escapedVersion\]" -Quiet)) {
            throw "CHANGELOG.md does not contain version $version"
          }

      - name: Build native release
        shell: pwsh
        run: ./scripts/build-native-release.ps1 -TargetDirectory "$env:RUNNER_TEMP\DagouPetBuild"

      - name: Smoke test packages
        shell: pwsh
        run: ./scripts/smoke-native-release.ps1 -InstallTest

      - name: Upload build archive
        uses: actions/upload-artifact@v4
        with:
          name: dagou-windows-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            release/Dagou-Desktop-Pet-Setup-*.exe
            release/Dagou-Desktop-Pet-Portable-*.exe
            release/SHA256SUMS.txt

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: .github/RELEASE_TEMPLATE.md
          fail_on_unmatched_files: true
          files: |
            release/Dagou-Desktop-Pet-Setup-*.exe
            release/Dagou-Desktop-Pet-Portable-*.exe
            release/SHA256SUMS.txt
