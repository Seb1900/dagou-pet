name: 功能建议
description: 提议一项适合免费桌宠定位的功能或改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 说明当前遇到的问题和使用环境。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明期望的交互和结果。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 可填写已经尝试过的办法或取舍。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 建议不包含广告、追踪、付费解锁或输入内容收集。
          required: true
