name: Bug 报告
description: 报告可以重复复现的软件问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 请勿在公开 Issue 中提交安全漏洞或个人输入内容。安全问题请使用仓库的私密安全报告。
  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 例如 1.2.3
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: 版本类型
      options:
        - 安装版
        - 免安装版
        - 开发版
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: 例如 Windows 11 24H2 x64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 按顺序列出操作步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可附截图、日志和复现频率，请先移除敏感信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，未发现相同报告。
          required: true
        - label: 该问题不属于需要私密报告的安全漏洞。
          required: true
